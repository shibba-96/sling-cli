- id: 21
  name: select_exclude_glob_drops_matching_columns
  mock_response_raw: |
    [
      {"id":1,"name":"Alice","email":"alice@example.com","internal_score":99,"internal_flag":true},
      {"id":2,"name":"Bob","email":"bob@example.com","internal_score":42,"internal_flag":false}
    ]
  spec:
