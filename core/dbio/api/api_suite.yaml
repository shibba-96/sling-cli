# id: 16 - Reproduces an API returning boolean `false` for unset fields.
# Without a processor, `false` leaks through as the string "false",
# breaking date/numeric casting downstream.
- id: 16
  name: boolean_false_leaks_through_without_processor
  mock_response:
    result:
      - id: 1
        name: Item One
        date: "2026-05-08"
        amount: 145.2
      - id: 2
        name: false
        date: false
        amount: false
  spec:
    name: test_api
    authentication:
      type: none
    endpoints:
      test_endpoint:
        name: test_endpoint
        response:
          records:
            jmespath: "result[*]"
            primary_key: ['id']
  expected_records:
    - id: "1"
      name: Item One
      date: "2026-05-08"
      amount: "145.2"
    - id: "2"
      name: "false"
      date: "false"
      amount: "false"
  expected_state: {}

# id: 17 - Spec-level fix: record-level processors use null_if() to coerce a
# boolean `false` sentinel to null per field. Works for any column type (date,
# string, numeric) since null_if compares the raw value to the given sentinel.
- id: 17
  name: boolean_false_to_null_via_record_processor
  mock_response:
    result:
      - id: 1
        name: Item One
        date: "2026-05-08"
        amount: 145.2
      - id: 2
        name: false
        date: false
        amount: false
  spec:
    name: test_api
    authentication:
      type: none
    endpoints:
      test_endpoint:
        name: test_endpoint
        response:
          processors:
            - expression: 'null_if(record.name, false)'
              output: record.name
            - expression: 'null_if(record.date, false)'
              output: record.date
            - expression: 'null_if(record.amount, false)'
              output: record.amount
          records:
            jmespath: "result[*]"
            primary_key: ['id']
  expected_records:
    - id: "1"
      name: Item One
      date: "2026-05-08"
      amount: "145.2"
    - id: "2"
      name: null
      date: null
      amount: null
  expected_state: {}

# id: 18 - chunk() + iterate: all chunk responses must be merged into the output.
# Reproduces the report: a list chunked into N batches hits the API N times, but
# only the first chunk's records reached the target. The mock here is body-aware
# (see api_test.go) and echoes one record per id in the request's `ids` payload,
# so a correct run produces every id across all chunks. A regression where only
# the first chunk loads would yield just the first 3 records and fail.
- id: 18
  name: chunk_iterate_merges_all_responses
  mock_response: {}
  spec:
    name: test_api
    authentication:
      type: none
    endpoints:
      test_endpoint:
        name: test_endpoint
        state:
          # 9 ids -> chunks of 3 -> 3 chunks -> 3 requests
          item_ids: [1, 2, 3, 4, 5, 6, 7, 8, 9]
        iterate:
          over: 'chunk(state.item_ids, 3)'
          into: 'state.batch_ids'
          concurrency: 1
        request:
          method: POST
          payload:
            ids: '{state.batch_ids}'
        response:
          records:
            jmespath: data
  # all 9 ids must arrive, across the 3 chunk requests
  expected_records:
    - id: "1"
      name: item_1
    - id: "2"
      name: item_2
    - id: "3"
      name: item_3
    - id: "4"
      name: item_4
    - id: "5"
      name: item_5
    - id: "6"
      name: item_6
    - id: "7"
      name: item_7
    - id: "8"
      name: item_8
    - id: "9"
      name: item_9
  expected_state: {}

