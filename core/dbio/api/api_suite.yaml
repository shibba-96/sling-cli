        response:
          processors:
            # map_values walks every key/value; real boolean `false` -> null,
            # any other value (incl. the string "false") is left untouched.
            - expression: 'jq(record, "map_values(if . == false then null else . end)")'
              output: record
          records:
            jmespath: "result[*]"
            primary_key: ['id']
  expected_records:
    - id: "1"
      name: Item One
      date: "2026-05-08"
      amount: "145.2"
      active: "true"
    - id: "2"
      name: null
      date: null
      amount: null
      active: null
  expected_state: {}

# id: 20 - records.select with an explicit list narrows the output columns.
# Only the listed columns survive, in the order listed. Uses mock_response_raw
# so the response body keeps the author-written key order (a map-based mock
# would be alphabetized by the JSON encoder).
- id: 20
  name: select_explicit_list_narrows_columns
  mock_response_raw: |
    [
      {"id":1,"name":"Alice","email":"alice@example.com","age":30,"internal_score":99},
      {"id":2,"name":"Bob","email":"bob@example.com","age":25,"internal_score":42}
    ]
  spec:
    name: test_api
    authentication:
      type: none
    endpoints:
      test_endpoint:
        name: test_endpoint
        response:
          records:
            jmespath: "@"
