# CDC merge_cdc Template Test: Redshift target
# Tests: INSERT, UPDATE, DELETE ops via merge_cdc strategy with staging table approach
# Note: Redshift uses DELETE + INSERT fallback (no MERGE)

env:
  TARGET: redshift

steps:
  # Clean up
  - connection: '{env.TARGET}'
    query: DROP TABLE IF EXISTS public.cdc_merge_test;

  # Create target table with initial data
  - connection: '{env.TARGET}'
    query: |
      CREATE TABLE public.cdc_merge_test (
        id INT PRIMARY KEY,
        name VARCHAR(100),
        amount INT,
        _sling_synced_at TIMESTAMP DEFAULT GETDATE()
      );
      INSERT INTO public.cdc_merge_test (id, name, amount) VALUES
        (1, 'Alice', 100),
        (2, 'Bob', 200),
        (3, 'Charlie', 300);

  # Run replication with CDC-like source data
  - replication:
      source: postgres
      target: '{env.TARGET}'

      defaults:
        mode: incremental
        primary_key: id

      streams:
        cdc_staging:
          sql: |
            SELECT 1 as id, 'Alice Updated' as name, 150 as amount, 'U' as _sling_synced_op, 1::bigint as _sling_cdc_seq, CURRENT_TIMESTAMP as _sling_synced_at
            UNION ALL SELECT 2, 'Bob', 200, 'D', 2, CURRENT_TIMESTAMP
            UNION ALL SELECT 4, 'Diana', 400, 'I', 3, CURRENT_TIMESTAMP
            UNION ALL SELECT 1, 'Alice Final', 175, 'U', 4, CURRENT_TIMESTAMP
          object: public.cdc_merge_test
          target_options:
            merge_strategy: change_capture

  # Verify results
  - type: query
    connection: '{env.TARGET}'
    query: SELECT count(*) as cnt FROM public.cdc_merge_test
    into: row_count

  - type: log
    message: "CDC merge row count: {store.row_count[0].cnt}"

  - type: check
    check: int_parse(store.row_count[0].cnt) == 3
    message: "Expected 3 rows, got {store.row_count[0].cnt}"

  - type: query
    connection: '{env.TARGET}'
    query: SELECT name, amount FROM public.cdc_merge_test WHERE id = 1
    into: row_1

  - type: check
    check: store.row_1[0].name == "Alice Final"
    message: "id=1 should have name='Alice Final', got '{store.row_1[0].name}'"

  - type: query
    connection: '{env.TARGET}'
    query: SELECT count(*) as cnt FROM public.cdc_merge_test WHERE id = 2
    into: row_2

  - type: check
    check: int_parse(store.row_2[0].cnt) == 0
    message: "id=2 should be deleted"

  - type: query
    connection: '{env.TARGET}'
    query: SELECT name FROM public.cdc_merge_test WHERE id = 4
    into: row_4

  - type: check
    check: store.row_4[0].name == "Diana"
    message: "id=4 should be inserted with name='Diana'"

  - type: log
    message: "CDC merge_cdc Redshift test PASSED"

  # Clean up
  - connection: '{env.TARGET}'
    query: DROP TABLE IF EXISTS public.cdc_merge_test;

  # ---------------------------------------------------------------------------
  # change_capture_soft: exercises the UPDATE ... / DELETE FROM ... templates,
  # which (like change_capture) must not put a table alias on the DELETE/UPDATE
  # target on Redshift. A delete op should soft-mark the row (_sling_synced_op='D')
  # rather than a hard-delete alias error.
  # ---------------------------------------------------------------------------
  - connection: '{env.TARGET}'
    query: DROP TABLE IF EXISTS public.cdc_soft_test;

  - connection: '{env.TARGET}'
    query: |
      CREATE TABLE public.cdc_soft_test (
        id INT PRIMARY KEY,
        name VARCHAR(100),
        amount INT,
        _sling_synced_op VARCHAR(1),
        _sling_synced_at TIMESTAMP DEFAULT GETDATE()
      );
      INSERT INTO public.cdc_soft_test (id, name, amount) VALUES
        (1, 'Alice', 100),
        (2, 'Bob', 200);

  - replication:
      source: postgres
      target: '{env.TARGET}'

      defaults:
        mode: incremental
        primary_key: id

      streams:
        cdc_soft_staging:
          sql: |
            SELECT 1 as id, 'Alice Updated' as name, 150 as amount, 'U' as _sling_synced_op, 1::bigint as _sling_cdc_seq, CURRENT_TIMESTAMP as _sling_synced_at
            UNION ALL SELECT 2, 'Bob', 200, 'D', 2, CURRENT_TIMESTAMP
          object: public.cdc_soft_test
          target_options:
            merge_strategy: change_capture_soft

  # id=2 was a delete op: with soft mode it should remain but be marked 'D'
  - type: query
    connection: '{env.TARGET}'
    query: SELECT _sling_synced_op as op FROM public.cdc_soft_test WHERE id = 2
    into: soft_2

  - type: check
    check: length(store.soft_2) == 1 && store.soft_2[0].op == "D"
    message: "id=2 should be soft-deleted (row kept, _sling_synced_op='D'), got {store.soft_2}"

  # id=1 was an update op
  - type: query
    connection: '{env.TARGET}'
    query: SELECT name FROM public.cdc_soft_test WHERE id = 1
    into: soft_1

  - type: check
    check: store.soft_1[0].name == "Alice Updated"
    message: "id=1 should be updated to 'Alice Updated', got '{store.soft_1[0].name}'"

  - type: log
    message: "CDC change_capture_soft Redshift test PASSED"

  - connection: '{env.TARGET}'
    query: DROP TABLE IF EXISTS public.cdc_soft_test;
